<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Restaurante</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h1 class="text-center mb-4">Restaurante Sabor Mineiro</h1>

        <div class="row">

            <!-- Prato 1 -->
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title">Feijoada Completa</h3>
                        <p class="card-text">
                            Feijão preto, carnes especiais, arroz, couve e farofa.
                        </p>
                        <h4>R$ 39,90</h4>
                    </div>
                </div>
            </div>

            <!-- Prato 2 -->
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title">Tropeiro Mineiro</h3>
                        <p class="card-text">
                            Feijão tropeiro, linguiça, ovo, arroz e torresmo.
                        </p>
                        <h4>R$ 34,90</h4>
                    </div>
                </div>
            </div>

            <!-- Prato 3 -->
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title">Frango com Quiabo</h3>
                        <p class="card-text">
                            Frango caipira acompanhado de quiabo e angu.
                        </p>
                        <h4>R$ 32,90</h4>
                    </div>
                </div>
            </div>

        </div>
    </div>

</html>
