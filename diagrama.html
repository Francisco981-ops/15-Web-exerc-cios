<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagramação</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        .topo {
            background-color: #cfcfcf;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .conteudo {
            display: flex;
            height: calc(100vh - 160px);
        }

        .menu {
            width: 25%;
            background-color: #d9d9d9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .principal {
            width: 75%;
            background-color: #efefef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .rodape {
            background-color: #cfcfcf;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }
</html>
